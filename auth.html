<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TL Schedules - Вход</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <img src="Image/icon.png" alt="Logo" class="auth-logo">
            <h1>TL Schedules</h1>
            <p>Система управления присутствием</p>
        </div>

        <!-- ВКЛАДКА ВХОДА -->
        <div id="loginTab" class="tab-content active">
            <h2>🔐 Вход в аккаунт</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Имя пользователя / Email:</label>
                    <input type="text" id="username" placeholder="admin, test1, student1" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary">Войти</button>
            </form>

            <p class="auth-toggle">
                <a href="#" onclick="goHome(); return false;">← Вернуться на главную</a>
            </p>
        </div>

        <div class="auth-footer">
            <p>📋 Тестовые учетные данные:</p>
            <p>👨‍💼 <strong>admin</strong> / admin123</p>
            <p>👨‍🏫 <strong>test1</strong> / test123</p>
            <p>👤 <strong>student1</strong> / student123</p>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"></script>

<script>
    // ========================================
    // ВСТРОЕННАЯ БАЗА ДАННЫХ ПОЛЬЗОВАТЕЛЕЙ
    // ========================================
    const USERS_DATABASE = {
        'admin': {
            username: 'admin',
            email: 'admin@tl-schedules.local',
            password: 'admin123',
            name: 'Администратор',
            role: 'admin',
            permissions: ['view_all', 'edit_attendance', 'manage_users', 'export_data']
        },
        'test1': {
            username: 'test1',
            email: 'test1@tl-schedules.local',
            password: 'test123',
            name: 'Тестовый Пользователь',
            role: 'teacher',
            permissions: ['view_attendance', 'mark_attendance']
        },
        'student1': {
            username: 'student1',
            email: 'student1@tl-schedules.local',
            password: 'student123',
            name: 'Ученик 1',
            role: 'student',
            permissions: ['view_own_attendance', 'mark_own_attendance']
        },
        'student2': {
            username: 'student2',
            email: 'student2@tl-schedules.local',
            password: 'student123',
            name: 'Ученик 2',
            role: 'student',
            permissions: ['view_own_attendance', 'mark_own_attendance']
        }
    };

    // Инициализация Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDx76_mQHM7EJCLhRA0sUpPj9Y0WqXNIeU",
        authDomain: "server-70049.firebaseapp.com",
        databaseURL: "https://server-70049-default-rtdb.firebaseio.com",
        projectId: "server-70049",
        storageBucket: "server-70049.firebasestorage.app",
        messagingSenderId: "184269338772",
        appId: "1:184269338772:web:e1182d8462dd8176501c81"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Функция поиска пользователя
    function findUser(usernameOrEmail) {
        // Ищем по username
        if (USERS_DATABASE[usernameOrEmail]) {
            return USERS_DATABASE[usernameOrEmail];
        }
        
        // Ищем по email
        for (const username in USERS_DATABASE) {
            if (USERS_DATABASE[username].email === usernameOrEmail) {
                return USERS_DATABASE[username];
            }
        }
        
        return null;
    }

    // Переход на главную
    function goHome() {
        window.location.href = 'index.html';
    }

    // Обработка входа
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        console.log('🔍 Поиск пользователя:', username);

        // Ищем пользователя в локальной базе
        const user = findUser(username);
        
        console.log('👤 Результат поиска:', user);

        if (user && user.password === password) {
            console.log('✅ Пароль совпадает!');
            
            // Сохраняем данные пользователя
            const userToStore = {
                uid: user.username,
                ...user,
                loginTime: new Date().toISOString()
            };
            
            localStorage.setItem('currentUser', JSON.stringify(userToStore));
            console.log('💾 Данные сохранены в localStorage');
            
            // Логируем вход в Firebase (опционально)
            db.ref('tl-schedules/login-logs/' + Date.now()).set({
                username: user.username,
                name: user.name,
                role: user.role,
                timestamp: new Date().toISOString()
            }).then(() => {
                console.log('📊 Лог входа записан в Firebase');
            }).catch(err => {
                console.log('⚠️ Firebase недоступен (это нормально):', err.message);
            });

            alert('✅ Вход выполнен успешно!\nДобро пожаловать, ' + user.name);
            window.location.href = 'attendance.html';
        } else {
            console.log('❌ Неверные учетные данные');
            alert('❌ Неверное имя пользователя или пароль');
            document.getElementById('password').value = '';
        }
    });
</script>
</body>
</html>
