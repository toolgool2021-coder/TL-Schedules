<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TL Schedules - Вход</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <img src="Image/icon.png" alt="Logo" class="auth-logo">
            <h1>TL Schedules</h1>
            <p>Система управления присутствием</p>
        </div>

        <!-- ВКЛАДКА ВХОДА -->
        <div id="loginTab" class="tab-content active">
            <h2>🔐 Вход в аккаунт</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Имя пользователя / Email:</label>
                    <input type="text" id="username" placeholder="admin, test1, student1" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary">Войти</button>
            </form>

            <p class="auth-toggle">
                <a href="#" onclick="goHome(); return false;">← Вернуться на главную</a>
            </p>
        </div>

        <div class="auth-footer">
            <p>📋 Тестовые учетные данные:</p>
            <p>👨‍💼 <strong>admin</strong> / admin123</p>
            <p>👨‍🏫 <strong>test1</strong> / test123</p>
            <p>👤 <strong>student1</strong> / student123</p>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"></script>

<!-- Загружаем файл с данными пользователей -->
<script src="users-data.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDx76_mQHM7EJCLhRA0sUpPj9Y0WqXNIeU",
        authDomain: "server-70049.firebaseapp.com",
        databaseURL: "https://server-70049-default-rtdb.firebaseio.com",
        projectId: "server-70049",
        storageBucket: "server-70049.firebasestorage.app",
        messagingSenderId: "184269338772",
        appId: "1:184269338772:web:e1182d8462dd8176501c81"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    /**
     * Переход на главную страницу
     */
    function goHome() {
        window.location.href = 'index.html';
    }

    /**
     * Обработка входа в аккаунт
     */
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        // Проверяем предустановленных пользователей
        const predefinedUser = getPredefinedUser(username);
        
        if (predefinedUser && predefinedUser.password === password) {
            // Успешный вход
            const userToStore = {
                uid: predefinedUser.username,
                ...predefinedUser,
                loginTime: new Date().toISOString()
            };
            
            localStorage.setItem('currentUser', JSON.stringify(userToStore));
            
            // Логируем вход в Firebase (для статистики)
            db.ref('tl-schedules/login-logs/' + Date.now()).set({
                username: predefinedUser.username,
                name: predefinedUser.name,
                role: predefinedUser.role,
                timestamp: new Date().toISOString()
            });

            alert('✅ Вход выполнен успешно! Добро пожаловать, ' + predefinedUser.name);
            window.location.href = 'attendance.html';
        } else {
            alert('❌ Неверное имя пользователя или пароль');
            document.getElementById('password').value = '';
        }
    });
</script>
</body>
</html>
