<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TL-Schedules - Расписание Уроков</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="snowCanvas"></canvas>

<div class="container">
    
    <!-- ВЕРХНЯЯ ИНФОРМАЦИЯ -->
    <div class="info-section">
        <div class="date-display">
            <p class="current-date" id="currentDate">00.00.0000</p>
            <p class="current-day" id="currentDay">День</p>
            <p class="current-lesson" id="currentLesson">Урок загружается...</p>
        </div>
    </div>

    <!-- ЦЕНТРАЛЬНЫЙ ТАЙМЕР -->
    <div class="timer-section">
        <div class="timer-display">
            <span class="timer-value" id="timerValue">00:00:00</span>
        </div>
        <p class="timer-label" id="timerLabel">Осталось до конца урока</p>
    </div>

    <!-- РАСПИСАНИЕ УРОКОВ -->
    <div class="schedule-section">
        <h2 id="scheduleTitle">Расписание на сегодня</h2>
        <div class="schedule-list" id="scheduleList">
            <!-- Заполняется JavaScript -->
        </div>
    </div>

    <!-- ПОЛНОЕ РАСПИСАНИЕ НА НЕДЕЛЮ -->
    <div class="full-schedule-section">
        <h2>Полное расписание</h2>
        <div class="week-schedule" id="weekSchedule">
            <!-- Заполняется JavaScript -->
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
