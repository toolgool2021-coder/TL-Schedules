<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TL Schedules - Посещаемость</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>

<div class="attendance-container">
    <div class="attendance-header">
        <h1 class="attendance-title">📋 Посещаемость</h1>
        
        <div class="user-info">
            <div class="user-avatar" id="userAvatar">И</div>
            <div class="user-details">
                <div class="user-name" id="userName">Загрузка...</div>
                <div class="user-role" id="userRole">Ученик</div>
            </div>
            <button class="logout-btn" onclick="logout()">Выход</button>
        </div>
    </div>

    <div class="date-info">
        <p id="currentDateTime"></p>
    </div>

    <div id="statsSection" class="attendance-stats" style="display: none;">
        <div class="stat-card">
            <div class="stat-number" id="presentCount">0</div>
            <div class="stat-label">Присутствуют</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="absentCount">0</div>
            <div class="stat-label">Отсутствуют</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="sickCount">0</div>
            <div class="stat-label">На болезнь</div>
        </div>
    </div>

    <div class="attendance-list">
        <div class="attendance-list-header">
            <i class="fas fa-list"></i> Список учеников
        </div>
        <div class="attendance-items" id="attendanceItems">
            <div class="empty-list">Загрузка данных...</div>
        </div>
    </div>

    <div id="resetSection" style="display: none; margin-top: 20px;">
        <button class="btn-reset" onclick="resetAttendance()">
            <i class="fas fa-redo"></i> Сбросить посещаемость на сегодня
        </button>
    </div>

    <div class="attendance-report-section">
        <h2>📊 Список отсутствующих</h2>
        <div class="attendance-report-container">
            <div class="report-column">
                <h3>📋 Статусы</h3>
                <div class="report-list" id="statusReport">
                    <p class="loading-text">Загрузка...</p>
                </div>
            </div>
            <div class="report-column">
                <h3>❌ Отсутствующие</h3>
                <div class="report-list" id="absentReport">
                    <p class="loading-text">Загрузка...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDx76_mQHM7EJCLhRA0sUpPj9Y0WqXNIeU",
        authDomain: "server-70049.firebaseapp.com",
        databaseURL: "https://server-70049-default-rtdb.firebaseio.com",
        projectId: "server-70049",
        storageBucket: "server-70049.firebasestorage.app",
        messagingSenderId: "184269338772",
        appId: "1:184269338772:web:e1182d8462dd8176501c81"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let attendanceData = {};
    const today = new Date().toISOString().split('T')[0];

    function init() {
        const userStr = localStorage.getItem('currentUser');
        if (!userStr) {
            window.location.href = 'auth.html';
            return;
        }

        currentUser = JSON.parse(userStr);
        displayUserInfo();
        updateDateTime();
        loadAttendance();
        initializeDailyReset();

        if (currentUser.role === 'admin') {
            document.getElementById('statsSection').style.display = 'grid';
            document.getElementById('resetSection').style.display = 'block';
        }

        setInterval(updateDateTime, 1000);
    }

    function displayUserInfo() {
        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('userRole').textContent = currentUser.role === 'admin' ? '👨‍💼 Администратор' : '👤 Ученик';
        document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
    }

    function updateDateTime() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
        document.getElementById('currentDateTime').textContent = now.toLocaleDateString('ru-RU', options);
    }

    function loadAttendance() {
        const attendancePath = `tl-schedules/attendance/${today}`;
        
        db.ref(attendancePath).on('value', snapshot => {
            attendanceData = snapshot.val() || {};
            renderAttendanceList();
            updateStats();
            generateReports();
        });

        db.ref('tl-schedules/users').once('value', snapshot => {
            if (!snapshot.exists()) return;

            snapshot.forEach(child => {
                if (!attendanceData[child.key]) {
                    attendanceData[child.key] = {
                        userId: child.key,
                        name: child.val().name,
                        role: child.val().role,
                        status: 'present'
                    };
                }
            });

            renderAttendanceList();
            generateReports();
        });
    }

    function renderAttendanceList() {
        const container = document.getElementById('attendanceItems');
        
        if (Object.keys(attendanceData).length === 0) {
            container.innerHTML = '<div class="empty-list">Нет данных о посещаемости</div>';
            return;
        }

        container.innerHTML = '';

        Object.entries(attendanceData).forEach(([key, data]) => {
            if (currentUser.role === 'student' && key !== currentUser.uid) {
                return;
            }

            const item = document.createElement('div');
            item.className = 'attendance-item';
            
            const isOwnRecord = key === currentUser.uid;
            const canEdit = currentUser.role === 'admin' || isOwnRecord;
            const initials = (data.name || 'П').split(' ').map(n => n[0]).join('').toUpperCase();

            let statusBadgeClass = 'status-present';
            let statusText = '✅ Присутствует';
            
            if (data.status === 'absent') {
                statusBadgeClass = 'status-absent';
                statusText = '❌ Отсутствует';
            } else if (data.status === 'sick') {
                statusBadgeClass = 'status-sick';
                statusText = '🤒 На болезнь';
            }

            item.innerHTML = `
                <div class="item-name">
                    <div class="item-avatar">${initials}</div>
                    <div class="item-info">
                        <div class="item-user-name">${data.name || 'Неизвестно'}</div>
                        <div class="item-user-role">${data.role === 'admin' ? '👨‍💼 Администратор' : '👤 Ученик'}</div>
                    </div>
                </div>
                <div class="item-status">
                    ${canEdit ? `
                        <select class="status-select" onchange="updateAttendance('${key}', this.value)">
                            <option value="present" ${data.status === 'present' ? 'selected' : ''}>✅ Присутствует</option>
                            <option value="absent" ${data.status === 'absent' ? 'selected' : ''}>❌ Отсутствует</option>
                            <option value="sick" ${data.status === 'sick' ? 'selected' : ''}>🤒 На болезнь</option>
                        </select>
                    ` : `
                        <div class="status-badge ${statusBadgeClass}">${statusText}</div>
                    `}
                </div>
            `;

            container.appendChild(item);
        });
    }

    function generateReports() {
        let statusReportHTML = '';
        let absentReportHTML = '';

        const sortedEntries = Object.entries(attendanceData)
            .filter(([key, data]) => data.role === 'student')
            .sort((a, b) => {
                const statusOrder = { present: 0, sick: 1, absent: 2 };
                return statusOrder[a[1].status] - statusOrder[b[1].status];
            });

        if (sortedEntries.length === 0) {
            statusReportHTML = '<p class="loading-text">Нет данных</p>';
            absentReportHTML = '<p class="loading-text">Все присутствуют ✅</p>';
        } else {
            sortedEntries.forEach(([key, data]) => {
                const statusEmoji = data.status === 'present' ? '✅' : (data.status === 'sick' ? '🤒' : '❌');
                statusReportHTML += `<div class="report-item">${statusEmoji} ${data.name}</div>`;
            });

            const absentUsers = sortedEntries.filter(([_, data]) => data.status === 'absent' || data.status === 'sick');
            if (absentUsers.length === 0) {
                absentReportHTML = '<p class="loading-text">Все присутствуют ✅</p>';
            } else {
                absentUsers.forEach(([key, data]) => {
                    const statusText = data.status === 'sick' ? '🤒 На болезнь' : '❌ Отсутствует';
                    absentReportHTML += `<div class="report-item">${data.name} - ${statusText}</div>`;
                });
            }
        }

        document.getElementById('statusReport').innerHTML = statusReportHTML;
        document.getElementById('absentReport').innerHTML = absentReportHTML;
    }

    function updateAttendance(userId, status) {
        const attendancePath = `tl-schedules/attendance/${today}/${userId}`;
        
        db.ref(attendancePath).update({
            status: status,
            updatedAt: new Date().toISOString()
        }).then(() => {
            loadAttendance();
        }).catch(error => {
            alert('❌ Ошибка обновления: ' + error.message);
        });
    }

    function updateStats() {
        let present = 0, absent = 0, sick = 0;

        Object.values(attendanceData).forEach(data => {
            if (data.status === 'present') present++;
            else if (data.status === 'absent') absent++;
            else if (data.status === 'sick') sick++;
        });

        document.getElementById('presentCount').textContent = present;
        document.getElementById('absentCount').textContent = absent;
        document.getElementById('sickCount').textContent = sick;
    }

    function initializeDailyReset() {
        function checkAndReset() {
            const now = new Date();
            const nextReset = new Date(now);
            nextReset.setDate(nextReset.getDate() + 1);
            nextReset.setHours(0, 0, 0, 0);
            const timeToReset = nextReset - now;
            setTimeout(() => {
                resetAttendanceAuto();
                checkAndReset();
            }, timeToReset);
        }
        checkAndReset();
    }

    function resetAttendanceAuto() {
        const newToday = new Date().toISOString().split('T')[0];
        db.ref('tl-schedules/users').once('value', snapshot => {
            if (!snapshot.exists()) return;
            const updates = {};
            snapshot.forEach(child => {
                updates[`tl-schedules/attendance/${newToday}/${child.key}`] = {
                    userId: child.key,
                    name: child.val().name,
                    role: child.val().role,
                    status: 'present',
                    createdAt: new Date().toISOString()
                };
            });
            db.ref().update(updates);
        });
    }

    function resetAttendance() {
        if (currentUser.role !== 'admin') {
            alert('❌ Только администраторы могут сбросить посещаемость');
            return;
        }
        if (!confirm('⚠️ Вы уверены?')) return;
        const attendancePath = `tl-schedules/attendance/${today}`;
        db.ref(attendancePath).remove().then(() => {
            alert('✅ Посещаемость сброшена');
            loadAttendance();
        }).catch(error => {
            alert('❌ Ошибка: ' + error.message);
        });
    }

    function logout() {
        if (confirm('Вы уверены, что хотите выйти?')) {
            localStorage.removeItem('currentUser');
            window.location.href = 'auth.html';
        }
    }

    init();
</script>
</body>
</html>
